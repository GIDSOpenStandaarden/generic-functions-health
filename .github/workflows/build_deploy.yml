name: Build and Deploy FHIR IG

on:
  push:
    branches: ["**"]

  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  packages: write
  pages: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build FHIR IG
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version:' sushi-config.yaml | sed 's/version: //' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push to local registry
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: localhost:5000/gidsopenstandaarden/gfh-publisher:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GitHub Container Registry
        continue-on-error: true
        run: |
          docker tag localhost:5000/gidsopenstandaarden/gfh-publisher:latest ghcr.io/${{ github.repository }}/publisher:latest
          docker push ghcr.io/${{ github.repository }}/publisher:latest

      - name: Build FHIR IG
        run: |
          docker run --rm \
            -v ${PWD}/input:/app/input \
            -v ${PWD}/output:/app/output \
            -v ${PWD}/ig.ini:/app/ig.ini \
            -v ${PWD}/sushi-config.yaml:/app/sushi-config.yaml \
            -v ${PWD}/build-cache:/app/input-cache \
            localhost:5000/gidsopenstandaarden/gfh-publisher:latest

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fhir-ig-output
          path: |
            ./output/
            ./sushi-config.yaml
          retention-days: 7

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions: write-all
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: fhir-ig-output

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './output'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  create-release-main:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions: write-all
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: fhir-ig-output
          path: ./build

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          name: ${{ needs.build.outputs.version }}
          tag_name: v${{ needs.build.outputs.version }}
          body: |
            Generic Functions for Health (Gezondheid) IG Release ${{ needs.build.outputs.version }}

            ## Documentation

            View the full Implementation Guide at the GitHub Pages deployment.
          files: |
            ./build/output/package.tgz
        env:
          GITHUB_TOKEN: ${{ github.token }}

  create-release-branch:
    name: Create Pre-release (Branch)
    needs: build
    runs-on: ubuntu-latest
    permissions: write-all
    if: github.ref != 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: fhir-ig-output
          path: ./build

      - name: Create Pre-release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: true
          name: ${{ needs.build.outputs.version }}-${{ github.ref_name }}
          tag_name: v${{ needs.build.outputs.version }}-${{ github.ref_name }}-${{ github.run_number }}
          body: |
            Generic Functions for Health (Gezondheid) IG Pre-release ${{ needs.build.outputs.version }}-${{ github.ref_name }}

            This is a pre-release build from branch `${{ github.ref_name }}`.
          files: |
            ./build/output/package.tgz
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ needs.build.outputs.version }}" >> $GITHUB_STEP_SUMMARY
